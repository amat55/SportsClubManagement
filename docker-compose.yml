version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sportsclub-postgres
    restart: always
    environment:
      POSTGRES_USER: sportsclub_user
      POSTGRES_PASSWORD: sportsclub_password
      POSTGRES_DB: sportsclub_db
    ports:
      - '5454:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
